<html>
    <head>
        <title>micro:bit UART</title>
    </head>
    <body>
        <h1>micro:bit UART Communication</h1>
        <button onclick="connectAndRun()">Connect</button>
        <button onclick="disconnect()">Disconnect</button>
        <div id="log" style="border: 1px solid black; height: 300px; overflow-y: auto; padding: 10px; font-family: monospace; white-space: pre-wrap;"></div>

        <script>
            const MICROBIT_ADDRESS = "EE:14:F0:AC:48:E6";
            const UART_SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
            const UART_RX_CHAR_UUID = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";
            const UART_TX_CHAR_UUID = "6e400003-b5a3-f393-e0a9-e50e24dcca9e";

            let device;
            let server;
            let rxCharacteristic;

            function log(msg) {
                const logDiv = document.getElementById('log');
                logDiv.textContent += msg + '\n';
                logDiv.scrollTop = logDiv.scrollHeight;
            }

            function isWritable(properties) {
                return !!(properties.write || properties.writeWithoutResponse);
            }

            function describeProperties(properties) {
                return JSON.stringify({
                    read: properties.read,
                    write: properties.write,
                    writeWithoutResponse: properties.writeWithoutResponse,
                    notify: properties.notify,
                    indicate: properties.indicate
                });
            }

            function selectWritableCharacteristic(chars) {
                // Prefer the standard UART RX characteristic first, then any writable UART characteristic.
                const preferred = chars.find(c => c.uuid.toLowerCase() === UART_RX_CHAR_UUID && isWritable(c.properties));
                if (preferred) {
                    return preferred;
                }
                return chars.find(c => isWritable(c.properties)) || null;
            }

            async function dumpAllGatt(server) {
                const services = await server.getPrimaryServices();
                log("All primary services and characteristics:");
                for (const s of services) {
                    log("Service: " + s.uuid);
                    const chars = await s.getCharacteristics();
                    for (const c of chars) {
                        log("  - " + c.uuid + " => " + describeProperties(c.properties));
                    }
                }
            }

            async function connectAndRun() {
                try {
                    if (!navigator.bluetooth) {
                        log("Error: Web Bluetooth is not available in this browser.");
                        return;
                    }

                    log("Requesting device...");
                    device = await navigator.bluetooth.requestDevice({
                        filters: [{ namePrefix: "BBC micro:bit" }],
                        optionalServices: [UART_SERVICE_UUID]
                    });

                    device.addEventListener('gattserverdisconnected', () => {
                        log("Disconnected");
                    });

                    log("Connecting to GATT server...");
                    server = await device.gatt.connect();

                    const service = await server.getPrimaryService(UART_SERVICE_UUID);
                    const chars = await service.getCharacteristics();
                    log("UART characteristics:");
                    for (const c of chars) {
                        log("- " + c.uuid + " => " + describeProperties(c.properties));
                    }

                    rxCharacteristic = selectWritableCharacteristic(chars);
                    if (!rxCharacteristic) {
                        await dumpAllGatt(server);
                        throw new Error("No writable characteristic found in UART service.");
                    }

                    log("Selected write characteristic: " + rxCharacteristic.uuid);

                    log("Connected! Starting send loop...\n");
                    await sendLoop();
                } catch (error) {
                    log("Error: " + error.message);
                }
            }

            async function sendLoop() {
                const chars = ["a ", "b ", "c ", "d "];
                for (let c of chars) {
                    try {
                        const payload = new TextEncoder().encode(c);
                        if (rxCharacteristic.properties.writeWithoutResponse) {
                            await rxCharacteristic.writeValueWithoutResponse(payload);
                        } else {
                            await rxCharacteristic.writeValueWithResponse(payload);
                        }
                        log("Sent: ." + c + ".");
                        await new Promise(r => setTimeout(r, 1000));
                    } catch (error) {
                        log("Send error: " + error.message);
                        break;
                    }
                }
            }

            function disconnect() {
                if (device && device.gatt.connected) {
                    device.gatt.disconnect();
                    log("Disconnected");
                }
            }
        </script>
    </body>
    </html>
